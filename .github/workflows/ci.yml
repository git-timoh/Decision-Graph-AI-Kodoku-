name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kodoku
          POSTGRES_PASSWORD: kodoku
          POSTGRES_DB: kodoku
        options: >-
          --health-cmd "pg_isready -U kodoku"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql+asyncpg://kodoku:kodoku@localhost:5432/kodoku
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: pytest
      - run: ruff check kodoku tests
      - run: mypy kodoku

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  # Builds and smoke-tests the actual shipped artifact: the Docker image bundles
  # the static UI + backend and serves both on one port over the SQLite default.
  # This is the only job that exercises the bundled UI, the create_all-on-startup
  # schema bootstrap, and single-port serving end to end.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t kodoku .
      - name: Smoke-test the packaged app
        run: |
          docker run -d --rm -p 8000:8000 --name kodoku kodoku
          for _ in $(seq 1 30); do
            curl -sf localhost:8000/healthz && break
            sleep 1
          done
          echo "--- health ---"; curl -sf localhost:8000/healthz
          echo "--- home ---";   curl -sf localhost:8000/ | grep -qi "<html"
          echo "--- /s/<id> ---"; curl -sf localhost:8000/s/smoke | grep -qi "<html"
          docker stop kodoku
